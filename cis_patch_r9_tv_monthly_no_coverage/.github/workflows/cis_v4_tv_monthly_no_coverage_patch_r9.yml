name: CIS v4 TV Monthly No Coverage Patch R9

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cis-v4-global-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync latest branch
        run: git pull --rebase --autostash

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply R9 patch
        run: python scripts/cis_v4/patch_tv_monthly_no_coverage_r9.py

      - name: Syntax check
        run: |
          python -m py_compile scripts/cis_v4/cis_tv_monthly_refresh.py
          python -m py_compile scripts/cis_v4/patch_tv_monthly_no_coverage_r9.py

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/cis_v4/cis_tv_monthly_refresh.py scripts/cis_v4/patch_tv_monthly_no_coverage_r9.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply TV monthly no coverage patch R9"
            git push
          fi
