name: CIS v4 Watchlist Update

on:
  workflow_dispatch:
    inputs:
      commands:
        description: 'ADD / UPDATE / STOP / RESUME commands. Examples: ADD US CRDO, UPDATE US CRDO｜Credo｜高速接続チップ｜ai_datacenter, STOP US CRDO｜理由'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: cis-v4-global-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watchlist-update:
    runs-on: ubuntu-latest
    env:
      COMMANDS: ${{ inputs.commands }}
    steps:
      - uses: actions/checkout@v4
      - name: Sync latest branch
        run: git pull --rebase --autostash
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run watchlist update
        id: run_update
        continue-on-error: true
        run: python scripts/cis_v4/cis_watchlist_update.py
      - name: Rebuild watchlist template
        id: rebuild_watchlist_template
        if: always()
        continue-on-error: true
        run: python scripts/cis_v4/cis_watchlist_template.py
      - name: Rebuild master init template
        id: rebuild_master_init
        if: always()
        continue-on-error: true
        run: python scripts/cis_v4/cis_master_init_template.py
      - name: Rebuild CIS home
        id: rebuild_home
        if: always()
        continue-on-error: true
        run: python scripts/cis_v4/cis_home.py
      - name: Commit master and report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for p in data/watchlist_master.csv data/company_master.csv data/watchlist_history.json output/v4 docs/v4; do
            if [ -e "$p" ]; then
              git add "$p"
            else
              echo "skip missing path: $p"
            fi
          done
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update CIS watchlist"
            git pull --rebase --autostash
            git push
          fi
      - name: Fail if watchlist update failed
        if: steps.run_update.outcome == 'failure' || steps.rebuild_watchlist_template.outcome == 'failure' || steps.rebuild_master_init.outcome == 'failure' || steps.rebuild_home.outcome == 'failure'
        run: exit 1
