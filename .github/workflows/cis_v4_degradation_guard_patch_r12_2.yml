name: CIS v4 Degradation Guard Patch R12.2

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: cis-v4-global-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest branch
        run: git pull --rebase --autostash
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply R12.2 degradation guard patch
        run: python scripts/cis_v4/patch_degradation_guard_r12_2.py
      - name: Syntax check
        run: |
          python -m py_compile scripts/cis_v4/cis_core.py
          python -m py_compile scripts/cis_v4/cis_home.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add scripts/cis_v4/cis_core.py scripts/cis_v4/cis_home.py README_degradation_guard_r12.md
            git commit -m "Apply R12.2 degradation guard"
            git push
          fi
