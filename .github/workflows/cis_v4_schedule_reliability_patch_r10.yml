name: CIS v4 Schedule Reliability Patch R10.4

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cis-v4-global-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync latest branch
        run: git pull --rebase --autostash

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply R10.4 schedule reliability patch
        run: python scripts/cis_v4/patch_schedule_reliability_r10.py

      - name: Syntax check
        run: |
          python -m py_compile scripts/cis_v4/cis_home.py
          python -m py_compile scripts/cis_v4/cis_schedule_catchup_r10.py

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/cis_v4/cis_home.py scripts/cis_v4/cis_schedule_catchup_r10.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply R10.4 schedule reliability patch"
            git pull --rebase --autostash
            git push
          fi
