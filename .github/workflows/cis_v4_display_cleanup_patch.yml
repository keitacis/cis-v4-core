name: CIS v4 Display Cleanup Patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-display-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Patch report display scripts
        run: python scripts/cis_v4/cis_display_cleanup_patch.py

      - name: Commit and push patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add scripts/cis_v4/cis_daily_jp.py scripts/cis_v4/cis_weekly_performance.py scripts/cis_v4/cis_buy_alert.py
            git commit -m "Clean up CIS v4 report display"
            git push
          fi
