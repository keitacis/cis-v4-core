name: CIS v4 TV Probe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tv-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile probe
        run: python -m py_compile scripts/cis_v4/cis_tv_probe.py

      - name: Run TradingView probe
        run: python scripts/cis_v4/cis_tv_probe.py

      - name: Commit probe report
        run: |
          git add docs/v4/latest/tv_probe_latest.* output/tv_probe_* || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Run TV probe"
            git push
          fi
